name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Validate pricing.json
        run: python -m json.tool pricing.json > /dev/null

      - name: Lint install.sh
        run: |
          bash -n install.sh
          shellcheck --severity=warning install.sh

      - name: Run tests
        run: |
          pip install pytest
          python -m pytest tests/ -v
